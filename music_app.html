<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe Dash - 音乐殿堂</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Specific styles for music_app.html */
        .music-page-container {
            padding: 3rem 10%;
            text-align: center;
        }
        .music-page-container h1 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .music-player-section {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto 2rem auto;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
        }
        .music-player-section h2 {
            color: var(--text-color);
            margin-bottom: 1.5rem;
        }
        .music-selection {
            margin-bottom: 2rem;
        }
        .music-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .music-item-btn {
            display: block;
            padding: 1rem;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
        }
        .music-item-btn:hover {
            background: var(--secondary-color);
            color: white;
            transform: scale(1.02);
        }
        audio {
            width: 100%;
            margin-top: 1.5rem;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: background 0.3s;
            margin-top: 2rem;
            text-align: center;
        }
        .back-button:hover {
            background: #e0708f;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="logo">🌸 MoeDash</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="#"><i class="fas fa-heart"></i> 收藏</a></li>
            <li><a href="#"><i class="fas fa-user"></i> 个人中心</a></li>
        </ul>
    </nav>

    <main class="music-page-container">
        <h1><i class="fas fa-music"></i> 音乐殿堂</h1>
        <p>Master，请选择您想聆听的旋律：</p>

        <section class="music-player-section">
            <h2>精选曲目</h2>
            <div class="music-selection">
                <a href="#" class="music-item-btn" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" data-name="恋爱循环 - 花泽香菜">
                    🌸 恋爱循环 - 花泽香菜
                </a>
                <a href="#" class="music-item-btn" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" data-name="Lemon - 米津玄师">
                    🍋 Lemon - 米津玄师
                </a>
            </div>
            <div id="audio-player-container">
                <!-- Audio player will be loaded here -->
            </div>
        </section>

        <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回主页
        </a>
    </main>

    <footer class="footer">
        <p>&copy; 2024 MoeDash | Crafted with ❤️ for Weebs</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const musicItems = document.querySelectorAll('.music-item-btn');
            const audioPlayerContainer = document.getElementById('audio-player-container');

            musicItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault(); // Prevent default link behavior
                    const musicSrc = item.dataset.src;
                    const musicName = item.dataset.name;

                    audioPlayerContainer.innerHTML = `
                        <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-color);">正在播放: ${musicName}</p>
                        <audio controls autoplay>
                            <source src="${musicSrc}" type="audio/mpeg">
                            您的浏览器不支持音频播放。
                        </audio>
                    `;
                });
            });
        });
    </script>
</body>
</html>
