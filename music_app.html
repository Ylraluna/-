<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe Dash - 音乐殿堂</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Specific styles for music_app.html */
        .music-page-container {
            padding: 3rem 10%;
            text-align: center;
        }
        .music-page-container h1 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .upload-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px dashed var(--primary-color, #ff85a2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            cursor: pointer;
        }
        .upload-section:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .upload-label {
            cursor: pointer;
            color: var(--primary-color, #ff85a2);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #music-upload {
            display: none;
        }
        .music-player-section {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto 2rem auto;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
        }
        .music-player-section h2 {
            color: var(--text-color);
            margin-bottom: 1.5rem;
        }
        .music-selection {
            margin-bottom: 2rem;
        }
        .music-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .music-item-btn {
            display: block;
            padding: 1rem;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
        }
        .music-item-btn:hover {
            background: var(--secondary-color);
            color: white;
            transform: scale(1.02);
        }
        audio {
            width: 100%;
            margin-top: 1.5rem;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: background 0.3s;
            margin-top: 2rem;
            text-align: center;
        }
        .back-button:hover {
            background: #e0708f;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="logo">🌸 MoeDash</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="#"><i class="fas fa-heart"></i> 收藏</a></li>
            <li><a href="#"><i class="fas fa-user"></i> 个人中心</a></li>
        </ul>
    </nav>

    <main class="music-page-container">
        <h1><i class="fas fa-music"></i> 音乐殿堂</h1>
        <p>Master，请选择您想聆听的旋律：</p>

        <section class="music-player-section">
            <div class="upload-section" onclick="document.getElementById('music-upload').click()">
                <label class="upload-label">
                    <i class="fas fa-cloud-upload-alt fa-2x"></i>
                    <span>点击上传您的音乐 (MP3/WAV)</span>
                </label>
                <input type="file" id="music-upload" accept="audio/*" multiple>
            </div>

            <h2>我的音乐库</h2>
            <div class="music-selection" id="music-list">
                <div class="music-item-wrapper">
                    <a href="#" class="music-item-btn" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" data-name="恋爱循环 (示例)">
                        🌸 恋爱循环 - 示例曲目
                    </a>
                </div>
            </div>
            <div id="audio-player-container">
                <!-- Audio player will be loaded here -->
            </div>
        </section>

        <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回主页
        </a>
    </main>

    <footer class="footer">
        <p>&copy; 2024 MoeDash | Crafted with ❤️ for Weebs</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioPlayerContainer = document.getElementById('audio-player-container');
            const musicUpload = document.getElementById('music-upload');
            const musicList = document.getElementById('music-list');
            const DB_NAME = 'MoeDashMusicDB';
            const STORE_NAME = 'songs';

            const initDB = () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            };

            // 1. 加载保存的音乐
            const loadSavedMusic = async () => {
                const db = await initDB();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    const wrappers = musicList.querySelectorAll('.music-item-wrapper');
                    for(let i = 1; i < wrappers.length; i++) wrappers[i].remove();
                    
                    request.result.forEach((music) => {
                        renderMusicItem(music.name, music.src, music.date, music.id);
                    });
                };
            };

            const renderMusicItem = (name, src, date, id) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'music-item-wrapper';
                wrapper.innerHTML = `
                    <a href="#" class="music-item-btn" data-src="${src}" data-name="${name}">
                        🎵 ${name.split('.')[0]}
                        <span class="upload-date">上传于: ${date}</span>
                    </a>
                    <button class="delete-btn" onclick="deleteMusic(${id})"><i class="fas fa-trash"></i></button>
                `;
                musicList.appendChild(wrapper);
            };

            // 删除音乐逻辑
            window.deleteMusic = async (id) => {
                const db = await initDB();
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.delete(id);
                transaction.oncomplete = () => loadSavedMusic();
            };

            loadSavedMusic();

            // 2. 上传逻辑
            musicUpload.addEventListener('change', async (e) => {
                const files = e.target.files;
                const db = await initDB();

                Array.from(files).forEach(file => {
                    if (file.type.startsWith('audio/')) {
                        const reader = new FileReader();
                        reader.onload = async (event) => {
                            const musicData = {
                                name: file.name,
                                src: event.target.result,
                                date: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                            };
                            const transaction = db.transaction(STORE_NAME, 'readwrite');
                            const store = transaction.objectStore(STORE_NAME);
                            store.add(musicData);
                            transaction.oncomplete = () => loadSavedMusic();
                        };
                        reader.readAsDataURL(file);
                    }
                });
                musicUpload.value = '';
            });

            // 3. 播放逻辑 (使用事件委托支持动态添加的内容)
            musicList.addEventListener('click', (e) => {
                const btn = e.target.closest('.music-item-btn');
                if (!btn) return;
                
                e.preventDefault();
                const musicSrc = btn.dataset.src;
                const musicName = btn.dataset.name;

                audioPlayerContainer.innerHTML = `
                    <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-color);">正在播放: ${musicName}</p>
                    <audio controls autoplay>
                        <source src="${musicSrc}" type="audio/mpeg">
                        您的浏览器不支持音频播放。
                    </audio>
                `;
            });
        });
    </script>
</body>
</html>
