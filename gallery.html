<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe Dash - 图片画廊</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gallery-container {
            padding: 3rem 10%;
            text-align: center;
        }
        .gallery-container h1 {
            color: var(--primary-color, #ff85a2);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .upload-section {
            margin-bottom: 30px;
            padding: 30px;
            border: 2px dashed var(--primary-color, #ff85a2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            cursor: pointer;
        }
        .upload-section:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.01);
        }
        .upload-label {
            cursor: pointer;
            color: var(--primary-color, #ff85a2);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #image-upload {
            display: none;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }
        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            height: 300px;
        }
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.4);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
        .img-info h4 {
            margin: 0;
            color: #333;
            font-size: 1.1rem;
        }
        .img-info .upload-date {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 85, 114, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .gallery-item:hover .delete-btn {
            display: flex;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: var(--primary-color, #ff85a2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 3rem;
            transition: 0.3s;
        }
        .back-button:hover {
            opacity: 0.9;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="logo">🌸 MoeDash</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="#"><i class="fas fa-heart"></i> 收藏</a></li>
            <li><a href="#"><i class="fas fa-user"></i> 个人中心</a></li>
        </ul>
    </nav>

    <main class="gallery-container">
        <h1><i class="fas fa-image"></i> 图片画廊</h1>
        <p>Master，为您收集的精美瞬间 (〃'▽'〃)</p>

        <div class="upload-section" onclick="document.getElementById('image-upload').click()">
            <label class="upload-label">
                <i class="fas fa-cloud-upload-alt fa-3x"></i>
                <span>点击上传或拖拽图片到这里 (支持多选)</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" multiple>
        </div>

        <div class="image-grid" id="image-grid">
            <!-- 用户上传的图片将在这里动态生成 -->
        </div>

        <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回主页
        </a>
    </main>

    <footer class="footer">
        <p>&copy; 2024 MoeDash | Crafted with ❤️ for Weebs</p>
    </footer>

    <script>
        // 可以在这里添加点击图片放大预览的功能
        // 1. 鼠标点击产生交互粒子效果
        document.addEventListener('click', (e) => {
            const symbols = ['🌸', '✨', '💖', '⭐', '🍡'];
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            const effect = document.createElement('span');
            effect.className = 'click-effect';
            effect.innerText = symbol;
            
            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';
            
            effect.style.setProperty('--tw-x', (Math.random() - 0.5) * 200 + 'px');
            effect.style.setProperty('--tw-y', (Math.random() - 0.5) * 200 + 'px');
            
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        });

        // 2. 图片上传与预览功能
        const imageUpload = document.getElementById('image-upload');
        const imageGrid = document.getElementById('image-grid');
        const STORAGE_KEY = 'moedash_gallery_images';

        // 初始化：加载本地保存的图片
        const loadSavedImages = () => {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            imageGrid.innerHTML = ''; // 清空当前网格
            saved.forEach((imgData, index) => { // 传递 uploadDate
                renderGalleryItem(imgData.name, imgData.src, imgData.uploadDate, index);
            });
        };

        // 渲染单个图片卡片
        const renderGalleryItem = (name, src, uploadDate, index) => { // 接收 uploadDate
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            galleryItem.innerHTML = `
                <button class="delete-btn" onclick="deleteImage(${index})"><i class="fas fa-trash"></i></button>
                <img src="${src}" alt="${name}">
                <div class="img-info">
                    <h4>${name.split('.')[0]}</h4>
                    <p class="upload-date">${uploadDate || '未知日期'}</p> <!-- 显示日期 -->
                </div>
            `;
            imageGrid.appendChild(galleryItem);
        };

        // 删除图片逻辑
        window.deleteImage = (index) => {
            let saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            saved.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            loadSavedImages(); // 重新渲染
        };

        // 执行初始加载
        loadSavedImages();

        imageUpload.addEventListener('change', (e) => {
            const files = e.target.files;
            let saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    
                    reader.onload = (event) => {
                        const newImg = { 
                            name: file.name, 
                            src: event.target.result,
                            uploadDate: new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) // 记录上传日期
                        };
                        saved.push(newImg);
                        try {
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                            loadSavedImages(); // 重新加载以显示新图片和日期
                        } catch (err) {
                            alert('Master，存储空间满了！建议删除一些旧图片再上传哦~');
                        }
                    };
                    
                    reader.readAsDataURL(file);
                }
            });
            
            // 重置上传控件，允许重复上传同名文件
            imageUpload.value = '';
        });
    </script>
</body>
</html>
